<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XICAN AI | Access RGB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Optimizaciones de rendimiento para 60 FPS */
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050505;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Evitar scrollbars innecesarios que causen layout shifts */
        }

        @keyframes rgb-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animaciones optimizadas con transform y opacity */
        @keyframes fade-in {
            from { opacity: 0; transform: translate3d(0, 10px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        @keyframes fade-out {
            from { opacity: 1; transform: translate3d(0, 0, 0); }
            to { opacity: 0; transform: translate3d(0, -10px, 0); }
        }

        @keyframes tear-out {
            0% { transform: translate3d(0, 0, 0) skewX(0deg); opacity: 1; }
            20% { transform: translate3d(-10px, 0, 0) skewX(-5deg); }
            100% { transform: translate3d(-150%, 0, 0) skewX(-20deg); opacity: 0; }
        }

        .section-fade-in {
            animation: fade-in 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            will-change: opacity, transform;
        }

        .section-fade-out {
            animation: fade-out 0.3s cubic-bezier(0.4, 0, 1, 1) forwards;
            will-change: opacity, transform;
        }

        .animate-tear-left {
            animation: tear-out 0.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            pointer-events: none;
            will-change: transform, opacity;
        }

        .top-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 350px;
            background: linear-gradient(90deg, #38bdf8, #2563eb, #ec4899, #9333ea, #7c3aed, #38bdf8);
            background-size: 300% 300%;
            animation: rgb-flow 8s linear infinite;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.15;
            mask-image: radial-gradient(50% 100% at 50% 0%, black, transparent);
            will-change: background-position;
        }

        .glass-card {
            background: rgba(12, 12, 14, 0.92);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
            width: 90%;
            max-width: 380px;
            padding: 3.5rem 1.5rem 2.5rem 1.5rem;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #38bdf8, #2563eb, #ec4899, #9333ea, #7c3aed, #38bdf8);
            background-size: 200% auto;
            animation: rgb-flow 4s linear infinite;
            z-index: 20;
            will-change: background-position;
        }

        .btn-back-absolute {
            position: absolute;
            top: 1.25rem;
            left: 1.25rem;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            transition: all 0.2s ease;
            z-index: 50;
            cursor: pointer;
        }

        .btn-back-absolute:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            transform: scale(1.05);
        }

        .btn-action {
            width: 100%;
            padding: 1.1rem;
            border-radius: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: transform 0.2s, filter 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            will-change: transform;
        }

        .btn-action:active {
            transform: scale(0.97);
        }

        .btn-keys { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; }
        .btn-outline { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #94a3b8; }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }

        .input-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: rgba(56, 189, 248, 0.5);
        }

        .input-field {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 0.85rem;
        }

        .ai-text-gradient {
            background: linear-gradient(90deg, #38bdf8, #ec4899, #9333ea, #38bdf8);
            background-size: 200% auto;
            animation: rgb-flow 3s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            will-change: background-position;
        }

        .hidden-section { display: none; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .main-loader {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid #38bdf8;
            animation: spin 0.8s linear infinite;
            will-change: transform;
        }

        /* Utilidades para GPU */
        .gpu-accelerated {
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
        }
    </style>
</head>
<body class="gpu-accelerated">

    <div class="top-glow"></div>

    <div class="glass-card" id="main-card">
        
        <!-- PANTALLA 1: BIENVENIDA -->
        <div id="welcome-section" class="section-fade-in">
            <div class="mb-8 inline-flex p-4 rounded-3xl bg-white/5 border border-white/10 mt-2">
                <i data-lucide="shield-check" class="w-12 h-12 text-[#38bdf8]"></i>
            </div>
            <h1 class="text-[10px] font-black text-gray-600 uppercase tracking-[0.6em] mb-2">XICAN INTERFACE</h1>
            <h2 class="text-4xl font-black mb-10 italic tracking-tighter">INICIAR CON</h2>
            <div class="space-y-4">
                <button onclick="triggerTearTransition('login')" class="btn-action btn-keys">
                    <i data-lucide="key-round" class="w-5 h-5"></i> Keys de Acceso
                </button>
                <button onclick="triggerTearTransition('guest')" class="btn-action btn-outline">
                    <i data-lucide="user-circle" class="w-5 h-5"></i> Invitado
                </button>
            </div>
        </div>

        <!-- PANTALLA INVITADO: SOLICITAR -->
        <div id="guest-request-section" class="hidden-section">
            <button onclick="showSection('welcome')" class="btn-back-absolute">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <div class="mb-6 inline-flex p-4 rounded-full bg-orange-500/10 border border-orange-500/20 mt-4">
                <i data-lucide="alert-triangle" class="w-12 h-12 text-orange-500"></i>
            </div>
            <h2 class="text-2xl font-black italic tracking-tighter mb-4">SOLICITAR CÓDIGO</h2>
            <p class="text-[10px] text-gray-400 font-bold mb-8 uppercase tracking-widest px-4">Llave temporal generada por el servidor.</p>
            <button onclick="handleRequestCode()" id="btn-request-code" class="btn-action btn-keys">SOLICITAR</button>
        </div>

        <!-- PANTALLA INVITADO: CÓDIGO -->
        <div id="guest-code-section" class="hidden-section">
            <button onclick="showSection('guest-request')" class="btn-back-absolute">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h2 class="text-xl font-black italic tracking-tighter mb-6 mt-6 uppercase">Código de Sesión</h2>
            <div class="bg-white/5 border border-white/10 p-6 rounded-2xl mb-6">
                <span class="text-5xl font-black italic tracking-widest ai-text-gradient">414623</span>
            </div>
            <div class="space-y-4">
                <button onclick="copyGuestCode()" class="btn-action btn-outline">COPIAR</button>
                <button onclick="showSection('guest-insert')" class="btn-action btn-keys">CONTINUAR</button>
            </div>
        </div>

        <!-- PANTALLA INVITADO: INSERTAR -->
        <div id="guest-insert-section" class="hidden-section">
            <button onclick="showSection('guest-code')" class="btn-back-absolute">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h2 class="text-2xl font-black italic tracking-tighter mb-8 mt-6 uppercase">Insertar</h2>
            <div class="input-group">
                <input type="text" id="guest-code-input" placeholder="000000" class="input-field text-center tracking-[1em] font-black text-xl">
            </div>
            <button onclick="validateGuestCode()" class="btn-action btn-keys mt-4">VERIFICAR</button>
        </div>

        <!-- PANTALLA LOGIN -->
        <div id="login-section" class="hidden-section">
            <button onclick="showSection('welcome')" class="btn-back-absolute">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h2 class="text-2xl font-black italic tracking-tighter text-[#38bdf8] mb-8 mt-6">AUTENTICACIÓN</h2>
            <div class="space-y-3">
                <div class="input-group">
                    <i data-lucide="user" class="w-4 h-4 text-gray-500"></i>
                    <input type="text" id="username" placeholder="Usuario" class="input-field">
                </div>
                <div class="input-group">
                    <i data-lucide="lock" class="w-4 h-4 text-gray-500"></i>
                    <input type="password" id="password" placeholder="Contraseña" class="input-field">
                </div>
                <div class="input-group">
                    <i data-lucide="hash" class="w-4 h-4 text-gray-500"></i>
                    <input type="text" id="key" placeholder="Key A1BN..." class="input-field">
                </div>
            </div>
            <button onclick="validateAccess()" class="btn-action btn-keys mt-6">ENTRAR</button>
        </div>

        <!-- LOADER -->
        <div id="loading-section" class="hidden-section py-10">
            <div class="flex flex-col items-center">
                <div class="main-loader mb-6"></div>
                <h3 class="text-sm font-black italic tracking-widest animate-pulse">SINCRO XICAN...</h3>
            </div>
        </div>

        <!-- ÉXITO -->
        <div id="guest-success-section" class="hidden-section py-8">
            <div class="mb-6 inline-flex p-5 rounded-full bg-cyan-500/20 border border-cyan-500/30">
                <i data-lucide="users" class="w-14 h-14 text-cyan-500"></i>
            </div>
            <h2 class="text-2xl font-black italic tracking-tighter text-cyan-500 mb-2">COLABORADOR</h2>
            <p class="text-xs font-bold mb-10 text-gray-400 px-4">ACCESO EXTERNO CONCEDIDO</p>
            <button onclick="location.reload()" class="btn-action btn-success">FINALIZAR</button>
        </div>

        <!-- Footer -->
        <div class="mt-10" id="global-footer">
            <div class="flex justify-center items-center gap-2 mb-2">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
                <span class="text-[8px] font-black text-green-500 uppercase tracking-widest">Active Core 60Hz</span>
            </div>
            <p class="text-[9px] text-gray-700 uppercase tracking-[0.4em] font-bold">XICAN ENGINE v4.0</p>
        </div>
    </div>

    <script>
        // Inicializar iconos de Lucide
        function initIcons() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', initIcons);

        function showSection(id) {
            const sections = [
                'welcome-section', 'login-section', 'loading-section', 
                'guest-request-section', 'guest-code-section', 
                'guest-insert-section', 'guest-success-section'
            ];
            
            const current = sections.find(s => !document.getElementById(s).classList.contains('hidden-section'));
            const targetId = id.includes('-section') ? id : id + '-section';
            const targetEl = document.getElementById(targetId);

            if (!targetEl) return;

            const transition = () => {
                sections.forEach(s => {
                    const el = document.getElementById(s);
                    if (el) el.classList.add('hidden-section');
                });
                
                targetEl.classList.remove('hidden-section');
                targetEl.classList.remove('section-fade-out');
                targetEl.classList.add('section-fade-in');
                initIcons();
            };

            if (current) {
                const currentEl = document.getElementById(current);
                currentEl.classList.add('section-fade-out');
                // Tiempo exacto de la animación para evitar frames perdidos
                setTimeout(transition, 300);
            } else {
                transition();
            }
        }

        function triggerTearTransition(target) {
            const welcome = document.getElementById('welcome-section');
            welcome.classList.add('animate-tear-left');
            
            // Usar requestAnimationFrame para asegurar que la transición ocurra en el siguiente frame
            requestAnimationFrame(() => {
                setTimeout(() => {
                    showSection(target === 'login' ? 'login' : 'guest-request');
                    setTimeout(() => welcome.classList.remove('animate-tear-left'), 100);
                }, 550);
            });
        }

        function handleRequestCode() {
            const btn = document.getElementById('btn-request-code');
            btn.innerHTML = `<div class="main-loader" style="width:16px; height:16px; border-width:2px;"></div>`;
            setTimeout(() => {
                showSection('guest-code');
                btn.innerHTML = 'SOLICITAR';
            }, 1200);
        }

        function copyGuestCode() {
            const code = "414623";
            const temp = document.createElement("input");
            temp.value = code;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand("copy");
            document.body.removeChild(temp);
            
            const btn = event.currentTarget;
            btn.textContent = "COPIADO";
            setTimeout(() => btn.textContent = "COPIAR", 1500);
        }

        function validateGuestCode() {
            const val = document.getElementById('guest-code-input').value;
            if (val === "414623") {
                showSection('loading');
                setTimeout(() => {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#38bdf8', '#a855f7'] });
                    showSection('guest-success');
                }, 1500);
            } else {
                alert("CÓDIGO ERRÓNEO");
            }
        }

        function validateAccess() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const k = document.getElementById('key').value;

            if (u === "Xican.net" && p === "123" && k === "A1BN34ISM") {
                showSection('loading');
                setTimeout(() => {
                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                    showSection('guest-success');
                }, 2000);
            } else {
                alert("ACCESO DENEGADO");
            }
        }
    </script>
</body>
</html>
